<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Test TREKKO</title>
  <style>
    body{margin:0;background:#0d0f1a;color:#eaeaf0;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;text-align:center;padding:20px}
    h1{color:#e94560;font-size:32px}
    .ok{background:#2ecc7133;border:1px solid #2ecc71;border-radius:10px;padding:12px 24px;font-size:16px}
    .info{font-size:12px;color:#7a7d99;max-width:90vw;word-break:break-all}
  </style>
</head>
<body>
  <h1>🗺️ TREKKO</h1>
  <div class="ok">✅ HTML + CSS OK</div>
  <div class="ok" id="js-ok" style="display:none">✅ JavaScript OK</div>
  <div class="info" id="info">Chargement JS...</div>
  <script>
    document.getElementById('js-ok').style.display='block';
    document.getElementById('info').textContent =
      'Navigateur : ' + navigator.userAgent.split(' ').slice(-2).join(' ') +
      '\nURL : ' + location.href +
      '\nSW : ' + ('serviceWorker' in navigator ? 'oui' : 'non') +
      '\nModules : ' + (typeof Promise !== 'undefined' ? 'oui' : 'non');
  </script>
</body>
</html>
