<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>TREKKO — Nettoyage</title>
  <style>
    body{margin:0;background:#0d0f1a;color:#eaeaf0;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;text-align:center;padding:20px}
    h1{color:#e94560;font-size:28px;margin:0}
    .box{background:#1a1f3a;border:1px solid #2ecc71;border-radius:12px;padding:16px 28px;font-size:15px;max-width:90vw}
    .ok{color:#2ecc71;font-size:18px}
    .countdown{font-size:40px;font-weight:bold;color:#e94560}
    .info{font-size:12px;color:#7a7d99}
  </style>
</head>
<body>
  <h1>🗺️ TREKKO</h1>
  <div class="box">
    <div class="ok" id="msg">⏳ Nettoyage en cours…</div>
  </div>
  <div class="countdown" id="cpt">3</div>
  <div class="box info" id="status">Suppression Service Worker…</div>

  <script>
    var done = 0;
    var total = 2;

    function check() {
      done++;
      if (done >= total) {
        document.getElementById('msg').textContent = '✅ Nettoyage terminé !';
        document.getElementById('status').textContent = 'Redirection vers TREKKO…';
        var n = 3;
        document.getElementById('cpt').textContent = n;
        var iv = setInterval(function() {
          n--;
          document.getElementById('cpt').textContent = n;
          if (n <= 0) {
            clearInterval(iv);
            window.location.replace('./');
          }
        }, 1000);
      }
    }

    // 1. Unregister all service workers
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        var p = regs.map(function(r) { return r.unregister(); });
        return Promise.all(p);
      }).then(function() {
        document.getElementById('status').textContent += ' ✓ SW supprimé.';
        check();
      }).catch(function() { check(); });
    } else {
      check();
    }

    // 2. Clear all caches
    if ('caches' in window) {
      caches.keys().then(function(keys) {
        return Promise.all(keys.map(function(k) { return caches.delete(k); }));
      }).then(function() {
        document.getElementById('status').textContent += ' Cache supprimé.';
        check();
      }).catch(function() { check(); });
    } else {
      check();
    }
  </script>
</body>
</html>
